<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Employee Portal</title>
<style>
  :root {
    --bg-deep:    #0d0d0d;
    --bg-card:    #161616;
    --bg-card2:   #1e1e1e;
    --border:     rgba(255,255,255,0.07);
    --border-hi:  rgba(255,100,30,0.35);
    --orange-1:   #ff6b1a;
    --orange-2:   #e83d00;
    --orange-3:   #ff9a5c;
    --text-1:     #f5f5f5;
    --text-2:     #a0a0a0;
    --text-3:     #666;
    --radius:     12px;
    --radius-sm:  8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--text-1);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,61,0,0.12) 0%, transparent 65%);
  }
  .login-box {
    width: 100%;
    max-width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
  }
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 2rem;
  }
  .logo-img {
    width: 72px;
    height: 72px;
    object-fit: contain;
  }
  .company-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-1);
  }
  .login-tagline {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 2px;
  }
  .field-label {
    display: block;
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .field-group { margin-bottom: 1.25rem; }
  .field-input {
    width: 100%;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--orange-1); }
  .field-input::placeholder { color: var(--text-3); }
  .btn-primary {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .login-error {
    display: none;
    background: rgba(220,50,50,0.12);
    border: 1px solid rgba(220,50,50,0.3);
    border-radius: var(--radius-sm);
    color: #f87171;
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 1rem;
    text-align: center;
  }

  /* ── DASHBOARD ── */
  #dashboard-screen { display: none; flex-direction: column; min-height: 100vh; }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 60px;
    background: rgba(13,13,13,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-1);
  }
  .header-logo img { width: 30px; height: 30px; object-fit: contain; }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-name { font-size: 13px; color: var(--text-2); }
  .avatar-chip {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-2);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-logout:hover { border-color: var(--border-hi); color: var(--orange-3); }

  .main-content {
    flex: 1;
    padding: 2rem 1.5rem;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-2);
    font-size: 14px;
    padding: 10px 18px;
    cursor: pointer;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text-1); }
  .tab-btn.active {
    color: var(--orange-3);
    border-bottom-color: var(--orange-1);
    font-weight: 500;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION TITLE ── */
  .section-eyebrow {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange-1);
    margin-bottom: 1rem;
  }

  /* ── STAT CARDS ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--border-hi); }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,107,26,0.04), transparent);
    pointer-events: none;
  }
  .stat-icon {
    font-size: 18px;
    margin-bottom: 12px;
    opacity: 0.7;
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.1;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 5px;
  }

  /* ── PAYSLIP LIST ── */
  .payslip-table {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .payslip-head {
    display: grid;
    grid-template-columns: 1fr 1fr 120px 100px;
    padding: 10px 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .payslip-row {
    display: grid;
    grid-template-columns: 1fr 1fr 120px 100px;
    align-items: center;
    padding: 14px 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    transition: background 0.15s;
  }
  .payslip-row:last-child { border-bottom: none; }
  .payslip-row:hover { background: rgba(255,255,255,0.02); }
  .payslip-period { font-weight: 500; color: var(--text-1); }
  .payslip-amount { color: var(--text-2); }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(34,197,94,0.12);
    color: #4ade80;
    border: 1px solid rgba(34,197,94,0.2);
  }
  .btn-dl {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--orange-3);
    background: rgba(255,107,26,0.08);
    border: 1px solid rgba(255,107,26,0.2);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-dl:hover { background: rgba(255,107,26,0.16); }
  .no-payslips {
    padding: 2.5rem;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
  }

  /* ── PROFILE FIELDS ── */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .profile-field {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .profile-field-label {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .profile-field-value {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-1);
  }

  /* ── LOADING ── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    gap: 16px;
    color: var(--text-2);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--orange-1);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-1);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .profile-grid { grid-template-columns: 1fr; }
    .payslip-head { display: none; }
    .payslip-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 8px;
    }
    .payslip-row .payslip-status { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo-wrap">
      <img src="logo.png" alt="Company logo" class="logo-img" id="logo-img" />
      <div>
        <div class="company-name" id="company-name-display">Company Portal</div>
        <div class="login-tagline">Sign in to view your information</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="emp-id">Employee ID</label>
      <input class="field-input" type="text" id="emp-id" placeholder="e.g. EMP-001" autocomplete="username" />
    </div>
    <div class="field-group">
      <label class="field-label" for="emp-pin">PIN</label>
      <input class="field-input" type="password" id="emp-pin" placeholder="Enter your PIN" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error">Incorrect Employee ID or PIN. Please try again.</div>
  </div>
</div>

<!-- ══════════ DASHBOARD ══════════ -->
<div id="dashboard-screen">
  <header>
    <div class="header-logo">
      <img src="logo.png" alt="logo" id="header-logo-img" />
      <span id="header-company-name">Portal</span>
    </div>
    <div class="header-right">
      <span class="header-name" id="header-emp-name"></span>
      <div class="avatar-chip" id="header-avatar">--</div>
      <button class="btn-logout" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <div class="main-content">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview', this)">Overview</button>
      <button class="tab-btn" onclick="switchTab('payslips', this)">Payslips</button>
      <button class="tab-btn" onclick="switchTab('profile', this)">My profile</button>
    </div>

    <!-- OVERVIEW -->
    <div class="tab-panel active" id="tab-overview">
      <div id="overview-loading" class="loading-state">
        <div class="spinner"></div>
        Loading your information…
      </div>
      <div id="overview-content" style="display:none;">
        <p class="section-eyebrow">At a glance</p>
        <div class="stat-grid" id="stat-grid">
          <!-- injected by JS -->
        </div>
      </div>
    </div>

    <!-- PAYSLIPS -->
    <div class="tab-panel" id="tab-payslips">
      <p class="section-eyebrow">Payslips</p>
      <div class="payslip-table">
        <div class="payslip-head">
          <span>Period</span>
          <span>Gross pay</span>
          <span>Status</span>
          <span></span>
        </div>
        <div id="payslip-list">
          <!-- injected by JS -->
        </div>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="tab-panel" id="tab-profile">
      <p class="section-eyebrow">My profile</p>
      <div class="profile-grid" id="profile-grid">
        <!-- injected by JS -->
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// CONFIG — update these two values
// ─────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyJADMZz-kOElPy6DybD-PWkDAG2i1JDBTSFtmTjsw3S0SB3wI6yxHdylxyE7s5qY/exec";
const COMPANY_NAME    = "JMB Virtuals";  // shown in header & login

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('company-name-display').textContent = COMPANY_NAME + ' Portal';
  document.getElementById('header-company-name').textContent  = COMPANY_NAME;

  // Allow Enter key on PIN field
  document.getElementById('emp-pin').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('emp-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('emp-pin').focus();
  });

  // Resume session
  const saved = sessionStorage.getItem('emp_data');
  if (saved) renderDashboard(JSON.parse(saved));
});

// ─────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────
async function doLogin() {
  const id  = document.getElementById('emp-id').value.trim();
  const pin = document.getElementById('emp-pin').value.trim();
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  if (!id || !pin) { showError('Please enter your Employee ID and PIN.'); return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const url = `${APPS_SCRIPT_URL}?id=${encodeURIComponent(id)}&pin=${encodeURIComponent(pin)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) {
      showError(data.error === 'NOT_FOUND' || data.error === 'WRONG_PIN'
        ? 'Incorrect Employee ID or PIN. Please try again.'
        : 'Something went wrong. Please try again.');
    } else {
      sessionStorage.setItem('emp_data', JSON.stringify(data));
      renderDashboard(data);
    }
  } catch (e) {
    showError('Could not connect. Please check your internet and try again.');
  } finally {
    btn.textContent = 'Sign in';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─────────────────────────────────────────────
// DASHBOARD RENDER
// ─────────────────────────────────────────────
function renderDashboard(data) {
  document.getElementById('login-screen').style.display    = 'none';
  document.getElementById('dashboard-screen').style.display = 'flex';

  const name = data.full_name || 'Employee';
  const initials = name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();

  document.getElementById('header-emp-name').textContent = name;
  document.getElementById('header-avatar').textContent   = initials;

  // ── OVERVIEW stats ──
  const overviewLoad = document.getElementById('overview-loading');
  const overviewContent = document.getElementById('overview-content');
  const statGrid = document.getElementById('stat-grid');

  const coreStats = [
    { icon: '👤', label: 'Name',          value: name,                     sub: data.employee_id || '' },
    { icon: '💼', label: 'Position',      value: data.position || '—',      sub: data.department || '' },
    { icon: '💰', label: 'Monthly rate',  value: data.rate ? formatMoney(data.rate) : '—', sub: 'Gross' },
    { icon: '📅', label: 'Start date',    value: data.start_date || '—',    sub: tenure(data.start_date) },
  ];

  // Append custom fields
  const reservedKeys = ['full_name','employee_id','position','department','rate','start_date','payslips','pin'];
  const custom = Object.entries(data).filter(([k]) => !reservedKeys.includes(k));
  custom.forEach(([k, v]) => {
    coreStats.push({ icon: '📌', label: labelify(k), value: v || '—', sub: '' });
  });

  statGrid.innerHTML = coreStats.map(s => `
    <div class="stat-card">
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}
    </div>
  `).join('');

  overviewLoad.style.display    = 'none';
  overviewContent.style.display = 'block';

  // ── PAYSLIPS ──
  const payslipList = document.getElementById('payslip-list');
  const payslips = data.payslips || [];
  if (payslips.length === 0) {
    payslipList.innerHTML = '<div class="no-payslips">No payslips available yet.</div>';
  } else {
    payslipList.innerHTML = payslips.map(p => `
      <div class="payslip-row">
        <span class="payslip-period">${p.period || '—'}</span>
        <span class="payslip-amount">${p.amount ? formatMoney(p.amount) : '—'}</span>
        <span class="payslip-status"><span class="badge">Available</span></span>
        <span>${p.link
          ? `<a class="btn-dl" href="${p.link}" target="_blank" rel="noopener">⬇ Download</a>`
          : '<span style="color:var(--text-3);font-size:13px;">—</span>'}</span>
      </div>
    `).join('');
  }

  // ── PROFILE ──
  const profileGrid = document.getElementById('profile-grid');
  const profileFields = [
    { label: 'Full name',       value: name },
    { label: 'Employee ID',     value: data.employee_id || '—' },
    { label: 'Position',        value: data.position || '—' },
    { label: 'Department',      value: data.department || '—' },
    { label: 'Start date',      value: data.start_date || '—' },
    { label: 'Monthly rate',    value: data.rate ? formatMoney(data.rate) : '—' },
    ...custom.map(([k, v]) => ({ label: labelify(k), value: v || '—' })),
  ];
  profileGrid.innerHTML = profileFields.map(f => `
    <div class="profile-field">
      <div class="profile-field-label">${f.label}</div>
      <div class="profile-field-value">${f.value}</div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// LOGOUT
// ─────────────────────────────────────────────
function doLogout() {
  sessionStorage.removeItem('emp_data');
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('login-screen').style.display    = 'flex';
  document.getElementById('emp-id').value  = '';
  document.getElementById('emp-pin').value = '';
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b   => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function formatMoney(val) {
  const n = parseFloat(String(val).replace(/[^\d.]/g, ''));
  if (isNaN(n)) return val;
  return '₱' + n.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function tenure(dateStr) {
  if (!dateStr) return '';
  const start = new Date(dateStr);
  if (isNaN(start)) return '';
  const now   = new Date();
  let months  = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  const years = Math.floor(months / 12);
  months = months % 12;
  const parts = [];
  if (years)  parts.push(`${years} yr${years !== 1 ? 's' : ''}`);
  if (months) parts.push(`${months} mo${months !== 1 ? 's' : ''}`);
  return parts.length ? parts.join(' ') + ' tenure' : 'New hire';
}

function labelify(key) {
  return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
