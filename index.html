<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Employee Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;800;900&display=swap');
  :root {
    --bg-deep:    #0d0d0d;
    --bg-card:    #161616;
    --bg-card2:   #1e1e1e;
    --border:     rgba(255,255,255,0.07);
    --border-hi:  rgba(255,100,30,0.35);
    --orange-1:   #ff6b1a;
    --orange-2:   #e83d00;
    --orange-3:   #ff9a5c;
    --text-1:     #f5f5f5;
    --text-2:     #a0a0a0;
    --text-3:     #666;
    --radius:     12px;
    --radius-sm:  8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--text-1);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,61,0,0.12) 0%, transparent 65%);
  }
  .login-box {
    width: 100%;
    max-width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    animation: fadeSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .login-box .field-group:nth-child(1) { animation: fadeSlideUp 0.5s 0.7s cubic-bezier(0.16,1,0.3,1) both; }
  .login-box .field-group:nth-child(2) { animation: fadeSlideUp 0.5s 0.85s cubic-bezier(0.16,1,0.3,1) both; }
  .btn-primary { animation: fadeSlideUp 0.5s 1s cubic-bezier(0.16,1,0.3,1) both; }
  .logo-wrap   { animation: fadeSlideUp 0.6s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
  .company-name  { animation: fadeSlideUp 0.5s 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  .login-tagline { animation: fadeSlideUp 0.5s 0.5s cubic-bezier(0.16,1,0.3,1) both; }

  /* Particle background */
  #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,107,26,0.5);
    animation: particleDrift linear infinite;
  }
  @keyframes particleDrift {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-20vh) scale(1); opacity: 0; }
  }
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .logo-wrap {
    position: relative;
  }
  .logo-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 16px rgba(255,107,26,0.6));
    animation: logoFadeIn 1s ease both;
  }
  @keyframes logoFadeIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .company-name {
    font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--text-1);
    text-align: center;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, #ff9a5c 50%, #ff6b1a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }
  .login-tagline {
    font-size: 13px;
    color: var(--text-2);
    margin-top: 2px;
    text-align: center;
  }
  .field-label {
    display: block;
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .field-group { margin-bottom: 0.85rem; }
  .field-input {
    width: 100%;
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-1);
    font-size: 15px;
    padding: 9px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--orange-1); }
  .field-input::placeholder { color: var(--text-3); }
  .btn-primary {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .login-error {
    display: none;
    background: rgba(220,50,50,0.12);
    border: 1px solid rgba(220,50,50,0.3);
    border-radius: var(--radius-sm);
    color: #f87171;
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 1rem;
    text-align: center;
  }

  /* ── DASHBOARD ── */
  #dashboard-screen { display: none; flex-direction: column; min-height: 100vh; }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 60px;
    background: rgba(13,13,13,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-1);
  }
  .header-logo img { 
    width: 30px; height: 30px; object-fit: contain;
    filter: drop-shadow(0 0 6px rgba(255,107,26,0.6));
    animation:;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-name { font-size: 13px; color: var(--text-2); }
  .avatar-chip {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-2);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-logout:hover { border-color: var(--border-hi); color: var(--orange-3); }

  .main-content {
    flex: 1;
    padding: 2rem 1.5rem;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-2);
    font-size: 14px;
    padding: 10px 18px;
    cursor: pointer;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text-1); }
  .tab-btn.active {
    color: var(--orange-3);
    border-bottom-color: var(--orange-1);
    font-weight: 500;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION TITLE ── */
  .section-eyebrow {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange-1);
    margin-bottom: 1rem;
  }

  /* ── STAT CARDS ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card:hover { border-color: var(--border-hi); }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,107,26,0.04), transparent);
    pointer-events: none;
  }
  .stat-icon {
    font-size: 18px;
    margin-bottom: 12px;
    opacity: 0.7;
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-1);
    line-height: 1.1;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 5px;
  }

  /* ── PAYSLIP LIST ── */
  .payslip-table {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .payslip-head {
    display: grid;
    grid-template-columns: 1fr 1fr 120px 100px;
    padding: 10px 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .payslip-row {
    display: grid;
    grid-template-columns: 1fr 1fr 120px 100px;
    align-items: center;
    padding: 14px 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    transition: background 0.15s;
  }
  .payslip-row:last-child { border-bottom: none; }
  .payslip-row:hover { background: rgba(255,255,255,0.02); }
  .payslip-period { font-weight: 500; color: var(--text-1); }
  .payslip-amount { color: var(--text-2); }
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(34,197,94,0.12);
    color: #4ade80;
    border: 1px solid rgba(34,197,94,0.2);
  }
  .btn-dl {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--orange-3);
    background: rgba(255,107,26,0.08);
    border: 1px solid rgba(255,107,26,0.2);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    font-family: inherit;
  }
  .btn-dl:hover { background: rgba(255,107,26,0.16); }
  .no-payslips {
    padding: 2.5rem;
    text-align: center;
    color: var(--text-3);
    font-size: 14px;
  }

  /* ── PROFILE FIELDS ── */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .profile-field {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .profile-field-label {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .profile-field-value {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-1);
  }

  /* ── PROFILE PHOTO ── */
  .dashboard-hero {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.75rem;
    position: relative;
    overflow: hidden;
  }
  .dashboard-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,107,26,0.06), transparent);
    pointer-events: none;
  }
  .hero-photo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--orange-1);
    flex-shrink: 0;
    box-shadow: 0 0 0 4px rgba(255,107,26,0.15);
  }
  .hero-avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--orange-1), var(--orange-2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    border: 2px solid var(--orange-1);
    box-shadow: 0 0 0 4px rgba(255,107,26,0.15);
  }
  .hero-info { flex: 1; }
  .hero-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 4px;
  }
  .hero-role {
    font-size: 13px;
    color: var(--text-2);
  }
  .hero-id {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
    font-family: monospace;
  }
  .header-avatar-img {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--orange-1);
  }

  /* ── LOADING ── */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    gap: 16px;
    color: var(--text-2);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--orange-1);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text-1);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .profile-grid { grid-template-columns: 1fr; }
    .payslip-head { display: none; }
    .payslip-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 8px;
    }
    .payslip-row .payslip-status { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; }
    * { transition: none !important; }
  }
</style>
</head>

<script>
// ─────────────────────────────────────────────
// CONFIG — update these two values
// ─────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyJADMZz-kOElPy6DybD-PWkDAG2i1JDBTSFtmTjsw3S0SB3wI6yxHdylxyE7s5qY/exec";
const COMPANY_NAME    = "JMB VIRTUALS";  // shown in header & login

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('company-name-display').textContent = COMPANY_NAME;
  document.getElementById('header-company-name').textContent  = COMPANY_NAME;

  // Allow Enter key on PIN field
  document.getElementById('emp-pin').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('emp-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('emp-pin').focus();
  });

  // Resume session
  const saved = sessionStorage.getItem('emp_data');
  if (saved) renderDashboard(JSON.parse(saved));
});

// ─────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────
async function doLogin() {
  const id  = document.getElementById('emp-id').value.trim();
  const pin = document.getElementById('emp-pin').value.trim();
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  if (!id || !pin) { showError('Please enter your Employee ID and PIN.'); return; }

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  err.style.display = 'none';

  try {
    const url = `${APPS_SCRIPT_URL}?id=${encodeURIComponent(id)}&pin=${encodeURIComponent(pin)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) {
      showError(data.error === 'NOT_FOUND' || data.error === 'WRONG_PIN'
        ? 'Incorrect Employee ID or PIN. Please try again.'
        : 'Something went wrong. Please try again.');
    } else {
      sessionStorage.setItem('emp_data', JSON.stringify(data));
      renderDashboard(data);
    }
  } catch (e) {
    showError('Could not connect. Please check your internet and try again.');
  } finally {
    btn.textContent = 'Sign in';
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ─────────────────────────────────────────────
// DASHBOARD RENDER
// ─────────────────────────────────────────────
function renderDashboard(data) {
  document.getElementById('login-screen').style.display    = 'none';
  document.getElementById('dashboard-screen').style.display = 'flex';

  const name = data.full_name || 'Employee';
  const initials = name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
  const photoUrl = data.photo ? convertDriveLink(data.photo) : null;

  document.getElementById('header-emp-name').textContent = name;

  // Header avatar — photo or initials
  const avatarEl = document.getElementById('header-avatar');
  if (photoUrl) {
    avatarEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = photoUrl;
    img.alt = name;
    img.className = 'header-avatar-img';
    img.onerror = () => { avatarEl.innerHTML = initials; img.remove(); };
    avatarEl.appendChild(img);
  } else {
    avatarEl.textContent = initials;
  }

  // ── HERO SECTION ──
  const hero = document.getElementById('dashboard-hero');
  const heroPhotoWrap = document.getElementById('hero-photo-wrap');
  document.getElementById('hero-name').textContent = name;
  document.getElementById('hero-role').textContent = [data.position, data.department].filter(Boolean).join(' · ');
  document.getElementById('hero-id').textContent   = data.employee_id || '';

  if (photoUrl) {
    const heroImg = document.createElement('img');
    heroImg.src       = photoUrl;
    heroImg.alt       = name;
    heroImg.className = 'hero-photo';
    heroImg.onerror   = () => {
      heroImg.remove();
      const av = document.createElement('div');
      av.className   = 'hero-avatar';
      av.textContent = initials;
      heroPhotoWrap.appendChild(av);
    };
    heroPhotoWrap.innerHTML = '';
    heroPhotoWrap.appendChild(heroImg);
  } else {
    heroPhotoWrap.innerHTML = `<div class="hero-avatar">${initials}</div>`;
  }
  hero.style.display = 'flex';

  // ── OVERVIEW stats ──
  const overviewLoad = document.getElementById('overview-loading');
  const overviewContent = document.getElementById('overview-content');
  const statGrid = document.getElementById('stat-grid');

  const coreStats = [
    { icon: '👤', label: 'Name',          value: name,                     sub: data.employee_id || '' },
    { icon: '💼', label: 'Position',      value: data.position || '—',      sub: data.department || '' },
    { icon: '💰', label: 'Monthly rate',  value: data.rate ? formatMoney(data.rate) : '—', sub: `Hourly: ${data.rate ? formatMoney(parseFloat(data.rate) / 240) : '—'}` },
    { icon: '📅', label: 'Start date',    value: formatDate(data.start_date), sub: tenure(data.start_date) },
  ];

  // Append custom fields
  const reservedKeys = ['full_name','employee_id','position','department','rate','start_date','payslips','pin','photo'];
  const custom = Object.entries(data).filter(([k]) => !reservedKeys.includes(k));
  custom.forEach(([k, v]) => {
    coreStats.push({ icon: '📌', label: labelify(k), value: v || '—', sub: '' });
  });

  statGrid.innerHTML = coreStats.map(s => `
    <div class="stat-card">
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      ${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}
    </div>
  `).join('');

  overviewLoad.style.display    = 'none';
  overviewContent.style.display = 'block';

  // ── PAYSLIPS ──
  const payslipList = document.getElementById('payslip-list');
  const payslips = data.payslips || [];
  if (payslips.length === 0) {
    payslipList.innerHTML = '<div class="no-payslips">No payslips available yet.</div>';
  } else {
    payslipList.innerHTML = payslips.map(p => `
      <div class="payslip-row">
        <span class="payslip-period">${p.period || '—'}</span>
        <span class="payslip-amount">${p.amount ? formatMoney(p.amount) : '—'}</span>
        <span class="payslip-status"><span class="badge">Available</span></span>
        <span>${p.link
          ? `<a class="btn-dl" href="${p.link}" target="_blank" rel="noopener">⬇ Download</a>`
          : '<span style="color:var(--text-3);font-size:13px;">—</span>'}</span>
      </div>
    `).join('');
  }

  // ── PROFILE ──
  const profileGrid = document.getElementById('profile-grid');
  const profileFields = [
    { label: 'Full name',       value: name },
    { label: 'Employee ID',     value: data.employee_id || '—' },
    { label: 'Position',        value: data.position || '—' },
    { label: 'Department',      value: data.department || '—' },
    { label: 'Start date',      value: formatDate(data.start_date) },
    { label: 'Monthly rate',    value: data.rate ? formatMoney(data.rate) : '—' },
    ...custom.map(([k, v]) => ({ label: labelify(k), value: v || '—' })),
  ];
  profileGrid.innerHTML = profileFields.map(f => `
    <div class="profile-field">
      <div class="profile-field-label">${f.label}</div>
      <div class="profile-field-value">${f.value}</div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function convertDriveLink(url) {
  if (!url) return null;
  // Convert Google Drive share link to direct image URL
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) {
    return `https://lh3.googleusercontent.com/d/${match[1]}`;
  }
  return url; // return as-is if not a Drive link
}

function formatMoney(val) {
  const n = parseFloat(String(val).replace(/[^\d.]/g, ''));
  if (isNaN(n)) return val;
  return '₱' + n.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(dateStr) {
  if (!dateStr || dateStr === '—') return '—';

  // Already looks like "May 27, 2023" — parse directly
  const direct = new Date(dateStr);
  if (!isNaN(direct)) {
    // Adjust for timezone offset so date doesn't shift
    const adjusted = new Date(direct.getTime() + direct.getTimezoneOffset() * 60000);
    return adjusted.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  }

  // Try YYYY-MM-DD or MM/DD/YYYY
  const parts = dateStr.split(/[-\/]/);
  if (parts.length >= 3) {
    // Detect YYYY-MM-DD vs MM/DD/YYYY
    const isISO = parts[0].length === 4;
    const year  = isISO ? +parts[0] : +parts[2];
    const month = isISO ? +parts[1] - 1 : +parts[0] - 1;
    const day   = isISO ? +parts[2] : +parts[1];
    const d = new Date(year, month, day);
    if (!isNaN(d)) {
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }
  }

  return dateStr; // return as-is if nothing works
}

function tenure(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split(/[-\/]/);
  if (parts.length < 3) return '';
  const start = new Date(parts[0], parts[1] - 1, parts[2]);
  if (isNaN(start)) return '';
  const now   = new Date();
  let months  = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
  const years = Math.floor(months / 12);
  months = months % 12;
  const pArr = [];
  if (years)  pArr.push(`${years} yr${years !== 1 ? 's' : ''}`);
  if (months) pArr.push(`${months} mo${months !== 1 ? 's' : ''}`);
  return pArr.length ? pArr.join(' ') + ' tenure' : 'New hire';
}

function labelify(key) {
  return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ── PARTICLES ──
(function() {
  const canvas = document.getElementById('particles-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function createParticle() {
    return {
      x: rand(0, W),
      y: H + rand(0, 20),
      r: rand(1, 3),
      speed: rand(0.4, 1.2),
      opacity: 0,
      maxOpacity: rand(0.3, 0.7),
      fadeIn: true,
    };
  }

  for (let i = 0; i < 40; i++) {
    const p = createParticle();
    p.y = rand(0, H); // start scattered
    particles.push(p);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach((p, i) => {
      p.y -= p.speed;
      if (p.fadeIn) {
        p.opacity += 0.012;
        if (p.opacity >= p.maxOpacity) p.fadeIn = false;
      } else {
        p.opacity -= 0.005;
      }
      if (p.y < -10 || p.opacity <= 0) {
        particles[i] = createParticle();
        return;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,107,26,${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
